name: variables and secrets
env:
  WF_VAR: "Workflow Level Variable"
on: 
  push:

jobs:
  test_variables:
    env: 
      JOB_VAR: "Job Level Variable"
    name: job to test variable
    runs-on: ubuntu-latest
    steps:
      - name: test variables
        id: stepVar
        env:
          STEP_VAR: "Step level variable"
        run : |
         echo ${{ github.actor }}
         echo $GITHUB_JOB
         echo $WF_VAR
         echo $JOB_VAR
         echo $STEP_VAR
         echo ${{ vars.CONF_VAR }}
         echo ${{ secrets.A_SECRET }}
         
         
    
